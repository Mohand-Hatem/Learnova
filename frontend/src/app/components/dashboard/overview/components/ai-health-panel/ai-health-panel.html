<div class="flex h-full min-h-[340px] min-w-0 flex-col rounded-2xl border border-theme bg-white p-5 shadow-sm dark:bg-bg-card">

  <!-- Header -->
  <div class="mb-4 flex items-center justify-between border-b border-theme pb-3">
    <h6 class="text-sm font-semibold text-text-primary">Top Searching Companies</h6>
  </div>

  @if (companies().length > 0) {
    <div class="flex flex-1 flex-col justify-between gap-2">
      @for (company of companies(); track company.name) {
        <div class="flex items-center gap-3 rounded-xl px-1 py-2 transition hover:bg-bg-secondary dark:hover:bg-bg-primary">

          <div
            class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl text-[0.65rem] font-bold text-white shadow-sm"
            [style.background]="company.color"
          >
            {{ company.initials }}
          </div>

          <div class="min-w-0 flex-1">
            <div class="truncate text-sm font-semibold text-text-primary">{{ company.name }}</div>
            <div class="truncate text-[0.65rem] text-text-muted">{{ company.searchType }}</div>
          </div>

          <div class="flex flex-col items-end shrink-0">
            <span class="text-sm font-bold text-text-primary">{{ company.count.toLocaleString() }}</span>
            <span class="text-[0.55rem] font-semibold uppercase tracking-[0.06em] text-text-muted">Searches</span>
          </div>
        </div>
      }
    </div>
  } @else {
    <div class="flex flex-1 items-center justify-center rounded-xl border border-dashed border-theme text-sm text-text-muted">
      No companies data available yet.
    </div>
  }

  <!-- Footer link -->
  <div class="mt-4 border-t border-theme pt-3">
    <a
      href="#"
      class="flex items-center gap-1.5 text-xs font-medium text-indigo-600 transition hover:text-indigo-500 dark:text-indigo-400 dark:hover:text-indigo-300"
    >
      Manage Recruiters
      <lucide-angular [img]="icons.ExternalLink" size="12"></lucide-angular>
    </a>
  </div>
</div>
