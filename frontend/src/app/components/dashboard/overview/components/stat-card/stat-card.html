<ng-container *ngIf="stat() as s">
  <ng-container *ngIf="chartOptions() as opts">
    <div class="stat-card hover-lift relative flex min-h-[140px] flex-col gap-2 overflow-hidden rounded-[1.75rem] border border-slate-700/50 bg-slate-950/75 p-3 shadow-[0_20px_50px_-28px_rgba(99,102,241,0.45)] backdrop-blur-xl">
      <div class="flex items-start justify-between gap-2">
        <span class="text-[0.58rem] uppercase tracking-[0.3em] text-slate-400">{{ s.title }}</span>
        <span class="flex h-9 w-9 items-center justify-center rounded-2xl bg-slate-900/85 text-violet-300 text-base transition-transform duration-300 hover:scale-110">
          <i class="bi" [class]="s.icon"></i>
        </span>
      </div>

  <div class="flex items-end justify-between gap-2">
    <div class="min-w-0">
      <div class="text-2xl font-semibold tracking-tight text-white">{{ s.value }}</div>
      <div
        class="mt-1.5 flex items-center gap-2 text-xs transition-colors duration-300"
        [class.text-emerald-400]="s.trendUp"
        [class.text-rose-400]="!s.trendUp"
      >
        <i class="bi transition-transform duration-300" [class.bi-arrow-up-short]="s.trendUp" [class.bi-arrow-down-short]="!s.trendUp"></i>
        <span class="font-semibold">{{ s.trendPercent }}</span>
        <span class="text-slate-400">{{ s.trendLabel }}</span>
      </div>
    </div>

    <div class="relative flex h-14 w-28 items-center justify-center rounded-[1.5rem] bg-slate-900/80 p-1.5 shadow-[inset_0_0_0_1px_rgba(148,163,184,0.08)]">
      <div class="absolute inset-0 rounded-[1.5rem] bg-gradient-to-br from-violet-500/10 via-slate-950/10 to-transparent"></div>
      <div class="relative h-full w-full overflow-hidden rounded-[1.25rem]">
        <apx-chart
          class="h-full w-full"
          [series]="opts.series!"
          [chart]="opts.chart!"
          [stroke]="opts.stroke!"
          [colors]="opts.colors!"
          [fill]="opts.fill!"
          [tooltip]="opts.tooltip!"
        ></apx-chart>
      </div>
    </div>
  </div>
</div>
</ng-container>
</ng-container>
