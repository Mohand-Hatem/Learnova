@if (stat(); as s) {
  <div class="stat-card group relative flex h-full min-h-[122px] flex-col overflow-hidden rounded-2xl border border-theme bg-white p-4 shadow-sm transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg dark:bg-bg-card sm:p-5">
    <span
      class="pointer-events-none absolute -right-6 -top-6 h-20 w-20 rounded-full blur-2xl transition-transform duration-500 group-hover:scale-110"
      [style.background]="glowColor(s)"
    ></span>

    <!-- Top row: title + icon badge -->
    <div class="relative z-10 flex items-start justify-between gap-2">
      <p class="text-[0.72rem] font-semibold tracking-wide text-text-muted">{{ s.title }}</p>
      <div
        class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl border border-theme/60 bg-bg-primary/80 transition-transform duration-300 group-hover:scale-105 dark:bg-bg-secondary/40"
        [class]="iconClasses(s)"
      >
        <lucide-angular [img]="iconMap[s.icon]" size="17"></lucide-angular>
      </div>
    </div>

    <!-- Value + echart -->
    <div class="relative z-10 mt-2 flex items-center justify-between gap-3">
      <div class="text-[1.65rem] font-bold tracking-tight text-text-primary sm:text-[1.85rem]">
        {{ s.value }}
      </div>
      <div
        echarts
        class="stat-card__chart h-[62px] w-[110px] shrink-0"
        [options]="miniChartOptions()"
        [autoResize]="true"
      ></div>
    </div>

    <!-- Bottom row -->
    <div class="relative z-10 mt-auto flex items-end justify-between gap-2 pt-2">

      @if (s.trendPercent) {
        @if (s.trendUp) {
          <span class="inline-flex items-center gap-1 rounded-full bg-emerald-50 px-2 py-0.5 text-[0.62rem] font-semibold text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-300">
            <svg width="9" height="9" viewBox="0 0 10 10" fill="currentColor" aria-hidden="true">
              <path d="M5 2 L9 7 L1 7 Z"/>
            </svg>
            {{ s.trendPercent }}
          </span>
        } @else {
          <span class="inline-flex items-center gap-1 rounded-full bg-rose-50 px-2 py-0.5 text-[0.62rem] font-semibold text-rose-700 dark:bg-rose-500/15 dark:text-rose-300">
            <svg width="9" height="9" viewBox="0 0 10 10" fill="currentColor" class="rotate-180" aria-hidden="true">
              <path d="M5 2 L9 7 L1 7 Z"/>
            </svg>
            {{ s.trendPercent }}
          </span>
        }
      }
    </div>

    <!-- Optional progress bar -->
    @if (s.progressValue !== undefined) {
      <div class="relative z-10 mt-3 h-1.5 w-full overflow-hidden rounded-full bg-slate-100/90 dark:bg-slate-700/60">
        <div
          class="h-full rounded-full transition-all duration-700"
          [style.background]="barFill(s)"
          [style.width.%]="s.progressValue"
        ></div>
      </div>
    }

  </div>
}
