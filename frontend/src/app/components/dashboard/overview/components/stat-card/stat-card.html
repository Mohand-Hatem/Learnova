@if (stat(); as s) {
  <div class="flex h-full min-h-[120px] flex-col rounded-2xl border border-theme bg-white p-4 shadow-sm transition-all duration-200 hover:shadow-md dark:bg-bg-card sm:p-5">

    <!-- Top row: title + icon badge -->
    <div class="flex items-start justify-between gap-2">
      <p class="text-xs font-semibold text-text-muted">{{ s.title }}</p>
      <div
        class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl transition-transform group-hover:scale-110"
        [class]="iconClasses(s)"
      >
        <lucide-angular [img]="iconMap[s.icon]" size="18"></lucide-angular>
      </div>
    </div>

    <!-- Value -->
    <div class="mt-2 text-2xl font-bold tracking-tight text-text-primary sm:text-3xl">
      {{ s.value }}
    </div>

    <!-- Bottom row: trend text + sparkline bars -->
    <div class="mt-auto flex items-end justify-between gap-2 pt-3">

      @if (s.trendPercent) {
        @if (s.trendUp) {
          <span class="flex items-center gap-1 text-[0.68rem] font-semibold text-emerald-600 dark:text-emerald-400">
            <svg width="9" height="9" viewBox="0 0 10 10" fill="currentColor" aria-hidden="true">
              <path d="M5 2 L9 7 L1 7 Z"/>
            </svg>
            {{ s.trendPercent }} from last month
          </span>
        } @else {
          <span class="flex items-center gap-1 text-[0.68rem] font-semibold text-rose-600 dark:text-rose-400">
            <svg width="9" height="9" viewBox="0 0 10 10" fill="currentColor" class="rotate-180" aria-hidden="true">
              <path d="M5 2 L9 7 L1 7 Z"/>
            </svg>
            {{ s.trendPercent }} from last month
          </span>
        }
      }

      <!-- Mini sparkline bar chart -->
      @if (sparklineBars(s).length) {
        <svg width="52" height="24" class="shrink-0 opacity-70" aria-hidden="true">
          @for (bar of sparklineBars(s); track $index) {
            <rect
              [attr.x]="bar.x"
              [attr.y]="bar.y"
              [attr.width]="bar.w"
              [attr.height]="bar.h"
              rx="1.5"
              [attr.fill]="barFill(s)"
            />
          }
        </svg>
      }
    </div>

    <!-- Optional progress bar (e.g. AI Match Rate) -->
    @if (s.progressValue !== undefined) {
      <div class="mt-3 h-1.5 w-full overflow-hidden rounded-full bg-slate-100 dark:bg-slate-700/60">
        <div
          class="h-full rounded-full transition-all duration-700"
          [class]="iconClasses(s).split(' ')[0].replace('bg-', 'bg-').replace('-50', '-500').replace('/15', '')"
          [style.width.%]="s.progressValue"
          style="background: var(--color-brand)"
        ></div>
      </div>
    }

  </div>
}
