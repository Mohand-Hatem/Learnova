<div class="flex h-full min-h-[340px] min-w-0 flex-col rounded-2xl border border-theme bg-white p-5 shadow-sm dark:bg-bg-card">

  <!-- Header -->
  <div class="mb-4 flex items-center justify-between border-b border-theme pb-3">
    <h6 class="text-sm font-semibold text-text-primary">CV Upload Trends vs Company Searches</h6>
    <div class="flex shrink-0 items-center gap-3">
      <span class="flex items-center gap-1.5 text-[0.68rem] font-medium text-text-muted">
        <span class="inline-block h-2 w-2 rounded-full bg-indigo-500"></span>Uploads
      </span>
      <span class="flex items-center gap-1.5 text-[0.68rem] font-medium text-text-muted">
        <span class="inline-block h-2 w-2 rounded-full bg-cyan-400"></span>Searches
      </span>
      @if (!isLive()) {
        <span class="rounded-full border border-amber-300/50 bg-amber-50 px-2 py-0.5 text-[0.6rem] font-semibold uppercase text-amber-600 dark:border-amber-400/20 dark:bg-amber-400/10 dark:text-amber-300">
          Demo
        </span>
      }
    </div>
  </div>

  <!-- Chart container — transparent so the card bg shows through -->
  <div class="flex-1 overflow-hidden rounded-xl">
    <div
      echarts
      class="block h-[250px] w-full min-h-[250px] min-w-0"
      [options]="chartOptions()"
      [autoResize]="true"
    ></div>
  </div>

</div>
