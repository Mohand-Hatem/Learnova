<div class="recent-cvs h-full min-h-[360px] min-w-0 overflow-hidden rounded-3xl border border-theme bg-white dark:bg-bg-card p-4 sm:p-5">
  <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
    <h6 class="text-sm font-semibold text-text-primary">Recent CVs</h6>
    <div class="flex items-center gap-2">
      <span *ngIf="!isLive()" class="rounded-full border border-amber-300 bg-amber-50 px-3 py-1 text-[0.65rem] font-semibold uppercase tracking-[0.04em] text-amber-600 dark:border-amber-400/25 dark:bg-amber-400/10 dark:text-amber-300">Demo</span>
      <a href="#" class="text-sm font-medium text-violet-600 dark:text-cyan-300 transition hover:text-violet-500 dark:hover:text-cyan-200">View all</a>
    </div>
  </div>

  <div class="grid gap-3 lg:hidden">
    <ng-container *ngFor="let cv of cvs(); let i = index">
      <article class="transition-smooth rounded-3xl border border-theme bg-white dark:bg-bg-secondary p-4 hover:border-violet-300 dark:hover:border-slate-700 hover:shadow-sm">
        <div class="mb-4 flex items-center gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-full bg-violet-100 text-sm font-semibold text-violet-700 dark:bg-slate-700 dark:text-slate-100">{{ cv.avatar }}</div>
          <div class="min-w-0">
            <div class="truncate text-sm font-semibold text-text-primary">{{ cv.name }}</div>
            <div class="truncate text-xs text-text-secondary">{{ cv.role }}</div>
          </div>
        </div>
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <div class="flex min-w-0 items-center gap-3">
            <div class="h-2.5 w-full min-w-[72px] sm:min-w-[96px] overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700">
              <div class="h-full rounded-full bg-violet-500 dark:bg-cyan-400 transition-all duration-500" [style.width.%]="cv.ats"></div>
            </div>
            <span class="text-sm font-semibold text-text-primary whitespace-nowrap">{{ cv.ats }}</span>
          </div>
          <span class="inline-flex items-center rounded-full px-3 py-1 text-[0.65rem] font-semibold uppercase tracking-[0.04em] transition-all duration-300 {{ statusClass(cv.status) }}">{{ cv.status }}</span>
        </div>
      </article>
    </ng-container>
  </div>

  <div class="hidden lg:block">
    <div class="overflow-x-auto rounded-3xl border border-theme bg-white dark:bg-bg-secondary">
      <table class="min-w-full border-separate border-spacing-0 text-left text-sm">
        <thead class="bg-white dark:bg-bg-card">
          <tr>
            <th class="border-b border-theme px-4 py-3 uppercase tracking-[0.18em] text-text-muted">Candidate</th>
            <th class="border-b border-theme px-4 py-3 uppercase tracking-[0.18em] text-text-muted">Role</th>
            <th class="border-b border-theme px-4 py-3 uppercase tracking-[0.18em] text-text-muted">ATS</th>
            <th class="border-b border-theme px-4 py-3 uppercase tracking-[0.18em] text-text-muted">Status</th>
          </tr>
        </thead>
        <tbody>
          <ng-container *ngFor="let cv of cvs()">
            <tr class="transition-colors border-t border-theme last:border-b-0 hover:bg-violet-50/50 dark:hover:bg-slate-800/50">
              <td class="px-4 py-4">
                <div class="flex items-center gap-3">
                  <div class="flex h-10 w-10 items-center justify-center rounded-full bg-violet-100 text-sm font-semibold text-violet-700 dark:bg-slate-700 dark:text-slate-100">{{ cv.avatar }}</div>
                  <span class="text-sm font-medium text-text-primary">{{ cv.name }}</span>
                </div>
              </td>
              <td class="px-4 py-4 text-sm text-text-secondary">{{ cv.role }}</td>
              <td class="px-4 py-4">
                <div class="flex items-center gap-3">
                  <div class="h-2.5 w-full min-w-[100px] overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700">
                    <div class="h-full rounded-full bg-violet-500 dark:bg-cyan-400 transition-all duration-500" [style.width.%]="cv.ats"></div>
                  </div>
                  <span class="text-sm font-semibold text-text-primary">{{ cv.ats }}</span>
                </div>
              </td>
              <td class="px-4 py-4">
                <span class="inline-flex items-center rounded-full px-3 py-1 text-[0.65rem] font-semibold uppercase tracking-[0.04em] transition-all duration-300 {{ statusClass(cv.status) }}">{{ cv.status }}</span>
              </td>
            </tr>
          </ng-container>
        </tbody>
      </table>
    </div>
  </div>
</div>
