<div class="dashboard mx-auto grid max-w-[1600px] gap-6 px-2 sm:px-4">
  <div *ngIf="loading()" class="rounded-[2rem] border border-theme bg-white dark:bg-bg-card px-4 py-3 text-sm text-text-secondary shadow-sm">
    Loading dashboard…
  </div>

  <div class="rounded-[2rem] border border-theme bg-white dark:bg-bg-card p-4 sm:p-6 shadow-sm">
    <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
      <div class="space-y-2">
        <div class="text-xs uppercase tracking-[0.32em] text-text-muted">Dashboard</div>
        <h1 class="text-2xl sm:text-3xl font-semibold text-text-primary">Welcome back, {{ userName() }}</h1>
        <p class="max-w-3xl text-sm text-text-secondary">Here's what's happening with your CV Intelligence platform today.</p>
      </div>
      <div class="flex flex-wrap items-center gap-3">
        <button type="button" class="inline-flex items-center gap-2 rounded-2xl border border-theme bg-bg-primary px-3 sm:px-4 py-2 text-sm text-text-primary transition hover:border-violet-400 hover:bg-violet-50 dark:hover:bg-violet-950/40">
          <lucide-angular [img]="icons.Download" size="18"></lucide-angular>
          <span class="hidden sm:inline">Export</span>
        </button>
        <button type="button" class="inline-flex items-center gap-2 rounded-2xl bg-gradient-to-r from-sky-500 to-violet-500 px-3 sm:px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-violet-500/20 transition hover:brightness-110 hover:shadow-xl">
          <lucide-angular [img]="icons.Plus" size="18"></lucide-angular>
          <span class="hidden sm:inline">New Analysis</span>
        </button>
      </div>
    </div>
  </div>

  <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
    <ng-container *ngFor="let stat of stats(); let i = index">
      <div class="min-h-[150px] w-full animate-slide-up" [style.animation-delay]="i * 0.05 + 's'">
        <app-stat-card [stat]="stat" />
      </div>
    </ng-container>
  </div>

  <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-[2fr_1fr]">
    <div class="animate-slide-up" style="animation-delay: 0.3s">
      <app-platform-activity-chart [activity]="platformActivity()" [isLive]="sources().platformActivity" />
    </div>
    <div class="animate-slide-up" style="animation-delay: 0.35s">
      <app-skills-bar-chart [skills]="topSkills()" [isLive]="sources().topSkills" />
    </div>
  </div>

  <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-[7fr_5fr]">
    <div class="animate-slide-up" style="animation-delay: 0.4s">
      <app-recent-cvs-table [cvs]="recentCvs()" [isLive]="sources().recentCvs" />
    </div>
    <div class="animate-slide-up" style="animation-delay: 0.45s">
      <app-ai-health-panel [items]="aiHealth()" [isLive]="sources().aiHealth" />
    </div>
  </div>
</div>
