<div class="mx-auto flex w-full min-w-0 max-w-full flex-col gap-6 xl:max-w-[1600px]">

  <!-- ── Page header ─────────────────────────────────────────────────── -->
  <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
    <div>
      <h1 class="text-3xl font-bold tracking-tight text-text-primary">Overview</h1>
      <p class="mt-1 text-sm text-text-muted">Intelligent recruitment analytics and system health.</p>
    </div>
    <div class="flex shrink-0 items-center gap-3">
      <button
        (click)="exportReport()"
        class="flex items-center gap-2 rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-500 active:scale-95"
      >
        <lucide-angular [img]="icons.Download" size="15"></lucide-angular>
        Export Report
      </button>
    </div>
  </div>

  <!-- ── Loading state ──────────────────────────────────────────────── -->
  @if (loading()) {
    <div class="rounded-2xl border border-theme bg-bg-card px-5 py-3 text-sm text-text-secondary">
      Loading dashboard…
    </div>
  }

  <!-- ── Stat Cards ─────────────────────────────────────────────────── -->
  <div class="grid min-w-0 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5">
    @for (stat of stats(); track stat.title; let i = $index) {
      <div class="min-w-0" [style.animation-delay]="i * 0.05 + 's'">
        <app-stat-card [stat]="stat" />
      </div>
    }
  </div>

  <!-- ── CV Upload Trends  |  Top Plans ────────────────────────────── -->
  <div class="grid min-w-0 grid-cols-1 gap-4 lg:grid-cols-[3fr_2fr]">
    <app-platform-activity-chart
      [activity]="platformActivity()"
      [isLive]="sources().platformActivity"
    />
    <app-top-plans-chart [plans]="topPlans()" [total]="842" />
  </div>

  <!-- ── Top Skills  |  Recent CVs  |  Top Companies ───────────────── -->
  <div class="grid min-w-0 grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3">
    <app-skills-bar-chart [skills]="topSkills()" [isLive]="sources().topSkills" />
    <app-recent-cvs-table [cvs]="recentCvs()" [isLive]="sources().recentCvs" />
    <app-ai-health-panel  [items]="aiHealth()" [isLive]="sources().aiHealth" [companies]="topCompanies()" />
  </div>

  <!-- ── AI Intelligence bar ──────────────────────────────────────── -->
  <div class="flex min-w-0 flex-col items-start gap-4 rounded-2xl border border-indigo-200 bg-indigo-50 px-5 py-4 sm:flex-row sm:items-center dark:border-indigo-500/20 dark:bg-indigo-950/40">
    <div class="flex shrink-0 items-center gap-3">
      <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-indigo-100 dark:bg-indigo-600/20">
        <lucide-angular [img]="icons.Bot" size="20" class="text-indigo-600 dark:text-indigo-400"></lucide-angular>
      </div>
      <span class="text-[0.62rem] font-bold uppercase tracking-[0.14em] text-indigo-600 dark:text-indigo-400">
        AI Intelligence
      </span>
    </div>
    <p class="flex-1 text-sm leading-relaxed text-indigo-900 dark:text-text-secondary">
      {{ aiInsight() }}
    </p>
    <button
      class="shrink-0 rounded-xl border border-indigo-300 bg-white px-4 py-2 text-xs font-semibold text-indigo-600 transition hover:bg-indigo-50 dark:border-indigo-500/30 dark:bg-transparent dark:text-indigo-400 dark:hover:bg-indigo-500/10"
    >
      View Full AI Report
    </button>
  </div>

</div>
