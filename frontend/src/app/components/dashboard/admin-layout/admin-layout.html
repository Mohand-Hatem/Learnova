<div class="relative min-h-screen w-full bg-bg-secondary">
  @if (sidebarOpen() && !isDesktop()) {
    <button
      type="button"
      class="fixed inset-0 z-1035 bg-slate-950/60 backdrop-blur-sm"
      aria-label="Close menu"
      (click)="closeSidebarOnMobile()"
    ></button>
  }

  <app-sidebar
    [open]="sidebarOpen()"
    [closeOnNav]="!isDesktop()"
    (closeRequested)="closeSidebarOnMobile()"
  />

  <div
    class="box-border flex min-h-screen w-full max-w-full min-w-0 flex-col bg-bg-secondary transition-[margin,width,max-width] duration-300 ease-out"
    [ngClass]="
      sidebarOpen() && isDesktop()
        ? 'lg:ml-[280px] lg:w-[calc(100%-280px)] lg:max-w-[calc(100vw-280px)]'
        : ''
    "
  >
    <header
      class="sticky top-0 z-1020 flex min-w-0 items-center justify-between gap-3 border-b border-theme bg-bg-secondary p-4 md:p-5"
    >
      <div class="flex min-w-0 items-center gap-3">
        <button
          type="button"
          class="inline-flex h-10 shrink-0 items-center gap-2 rounded-xl border border-theme bg-bg-card px-3 text-sm font-medium text-text-primary transition-colors hover:bg-violet-100 hover:text-violet-700 focus:outline-none dark:hover:bg-slate-900/70 dark:hover:text-white"
          [attr.aria-expanded]="sidebarOpen()"
          [attr.aria-label]="sidebarOpen() ? 'Close sidebar' : 'Open sidebar'"
          (click)="toggleSidebar()"
        >
          @if (!isDesktop() && sidebarOpen()) {
            <lucide-angular [img]="icons.X" size="20"></lucide-angular>
          } @else {
            <lucide-angular [img]="icons.Menu" size="20"></lucide-angular>
          }
          <span class="hidden sm:inline">Toggle sidebar</span>
        </button>
      </div>

      <div class="flex shrink-0 items-center gap-2">
        <button
          type="button"
          class="inline-flex items-center justify-center rounded-xl p-2 text-text-secondary transition-colors duration-300 hover:bg-violet-100 hover:text-violet-600 focus:outline-none md:hidden dark:hover:bg-slate-900/50 dark:hover:text-white"
          aria-label="Search"
        >
          <lucide-angular [img]="icons.Search" size="20"></lucide-angular>
        </button>
        <button
          type="button"
          aria-label="Toggle theme"
          (click)="themeService.toggle()"
          class="relative flex h-10 w-20 cursor-pointer items-center rounded-full transition-colors duration-300 focus:outline-none"
          [ngClass]="themeService.isDark() ? 'bg-brand' : 'bg-gray-200'"
        >
          <span class="sr-only">Toggle theme</span>
          <span
            class="relative left-1 top-0 flex h-8 w-8 items-center justify-center rounded-full bg-white shadow-md transition-transform duration-300"
            [style.transform]="themeService.isDark() ? 'translateX(2.50rem)' : 'translateX(0)'"
          >
            <ng-container *ngIf="themeService.isDark(); else showMoon">
              <lucide-angular [img]="icons.Sun" size="15" class="text-yellow-600"></lucide-angular>
            </ng-container>
            <ng-template #showMoon>
              <lucide-angular [img]="icons.Moon" size="15" class="text-indigo-950"></lucide-angular>
            </ng-template>
          </span>
        </button>

        <button
          type="button"
          class="inline-flex cursor-pointer items-center justify-center rounded-xl border border-theme bg-bg-card px-4 py-2 text-sm font-medium text-text-primary transition-colors duration-300 hover:bg-violet-100 hover:text-violet-700 focus:outline-none dark:hover:bg-slate-900 dark:hover:text-white"
          (click)="logout()"
        >
          Logout
        </button>
        <div class="flex items-center gap-2">
          <img
            [src]="user()?.avatar"
            alt=""
            class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-linear-to-br from-violet-500 to-cyan-500 text-sm font-semibold text-white transition-transform duration-300 hover:scale-110"
          />

          <div class="hidden md:block">
            <div class="text-sm font-semibold">{{ userName() }}</div>
            <div class="text-xs text-text-muted">{{ userRole() }}</div>
          </div>
        </div>
      </div>
    </header>

    <main class="min-h-0 min-w-0 flex-1 overflow-x-hidden overflow-y-auto bg-transparent p-4 md:p-6">
      <router-outlet />
    </main>
  </div>
</div>
