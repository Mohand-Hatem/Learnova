<div class="admin-layout min-h-screen w-full overflow-x-hidden relative">
  <button
    *ngIf="sidebarOpen()"
    type="button"
    class="fixed inset-0 z-[1035] bg-slate-950/60 backdrop-blur-sm lg:hidden"
    aria-label="Close menu"
    (click)="closeSidebar()"
  ></button>

  <app-sidebar [open]="sidebarOpen()" (closeRequested)="closeSidebar()" />

  <div class="admin-layout__main flex min-h-screen flex-col bg-bg-secondary lg:ml-[280px]">
    <header
      class="admin-layout__header sticky top-0 z-[1020] flex items-center justify-between gap-3 border-b border-theme bg-bg-secondary p-4 md:p-5"
    >
      <div class="admin-layout__header-start flex items-center gap-3">
    

   <div
  class="hidden md:flex min-w-[340px] lg:min-w-[460px] items-center justify-between rounded-2xl border border-violet-500/15 bg-gradient-to-r from-violet-500/10 via-fuchsia-500/10 to-cyan-500/10 px-6 py-3 backdrop-blur-xl shadow-[0_8px_32px_rgba(139,92,246,0.12)] transition-all duration-300 hover:shadow-[0_12px_40px_rgba(139,92,246,0.18)] hover:-translate-y-0.5"
>
  <div class="flex items-center gap-4">
    <div
      class="relative flex h-11 w-11 items-center justify-center rounded-xl bg-white/60 ring-1 ring-violet-500/15"
    >
      <span
        class="absolute h-3 w-3 rounded-full bg-emerald-400 animate-ping"
      ></span>

      <span class="text-xl relative">✨</span>
    </div>

    <div>
      <div
        class="bg-gradient-to-r from-violet-600 via-fuchsia-500 to-cyan-500 bg-clip-text text-base font-bold text-transparent"
      >
        Aventra AI
      </div>

      <div class="text-xs text-text-secondary">
        Intelligent CV Analysis & Recruitment Insights
      </div>
    </div>
  </div>

  <div
    class="rounded-full bg-emerald-500/10 px-3 py-1 text-xs font-medium text-emerald-600 ring-1 ring-emerald-500/15"
  >
    ● Online
  </div>
</div>
      </div>

      <div class="admin-layout__header-actions flex items-center gap-2">
        <button
          type="button"
          class="inline-flex items-center justify-center rounded-xl p-2 text-text-secondary transition-colors duration-300 hover:text-violet-600 hover:bg-violet-100 dark:hover:text-white dark:hover:bg-slate-900/50 focus:outline-none md:hidden"
          aria-label="Search"
        >
          <lucide-angular [img]="icons.Search" size="20"></lucide-angular>
        </button>
        <button
          type="button"
          aria-label="Toggle theme"
          (click)="themeService.toggle()"
          class="relative w-20 h-10 rounded-full cursor-pointer transition-colors duration-300 focus:outline-none flex items-center"
          [ngClass]="themeService.isDark() ? 'bg-brand' : 'bg-gray-200'"
        >
          <span class="sr-only">Toggle theme</span>
          <span
            class="relative left-1 top-0 w-8 h-8 bg-white rounded-full shadow-md flex items-center justify-center transition-transform duration-300"
            [style.transform]="themeService.isDark() ? 'translateX(2.50rem)' : 'translateX(0)'"
          >
            <ng-container *ngIf="themeService.isDark(); else showMoon">
              <lucide-angular [img]="icons.Sun" size="15" class="text-yellow-600"></lucide-angular>
            </ng-container>
            <ng-template #showMoon>
              <lucide-angular [img]="icons.Moon" size="15" class="text-indigo-950"></lucide-angular>
            </ng-template>
          </span>
        </button>

        <button
          type="button"
          class="inline-flex cursor-pointer items-center justify-center rounded-xl border border-theme bg-bg-card px-4 py-2 text-sm font-medium text-text-primary transition-colors duration-300 hover:bg-violet-100 hover:text-violet-700 dark:hover:bg-slate-900 dark:hover:text-white focus:outline-none"
          (click)="logout()"
        >
          Logout
        </button>
        <div class="flex items-center gap-2">
          <img
            [src]="user()?.avatar"
            class="admin-layout__avatar flex h-10 w-10 items-center justify-center rounded-full bg-gradient-to-br from-violet-500 to-cyan-500 text-sm font-semibold text-white transition-transform duration-300 hover:scale-110"
          />

          <div class="hidden md:block">
            <div class="text-sm font-semibold">{{ userName() }}</div>
            <div class="text-text-muted text-xs">{{ userRole() }}</div>
          </div>
        </div>
      </div>
    </header>

    <main class="admin-layout__content flex-1 min-w-0 overflow-x-hidden overflow-y-auto p-4 md:p-6">
      <router-outlet />
    </main>
  </div>
</div>
